<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link rel="icon" href="/assets/img/scrum-master-logo-circle.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body class="dashboard">
    <div class="app">
      <aside class="sidebar" aria-label="Perfil e dados da conta">
        <header class="sidebar__brand">
          <div class="logo">
            <div class="logo__mark">
              <a href="home.html">
                <img class="logo__gears" src="/assets/img/scrum-master-logo-circle.ico" />
              </a>
            </div>
            <span class="logo__title">Sprint<br />Master</span>
          </div>
        </header>

        <div class="profile">
            <div class="profile__avatar-wrap">
              <img
                id="profile-img"
                class="profile__avatar"
                src="/assets/img/user-icon.png"
                alt="Foto do usuário"
              />
              <button class="btn-pfp-hide" id="btn-pfp"><i class="fa-solid fa-dice"></i></button>
            </div>
              <h1 class="profile__name" id="name-display"></h1>
              <p class="profile__email" id="email-display"></p>
              <button type="button" class="btn-edit btn-open-edit-show" id="btn-open-edit">Editar perfil</button>
        </div>
        
        <div class="sidebar alts-holder-hide" id="alts-holder">
            <label class="field">
              <span class="field__label">Nome Completo</span>
              <div class="field-fuser">
                <input
                  class="field__input"
                  type="text"
                  name="nome"
                  value=""
                  id="name-input"
                />
                <button type="button" class="alt-button" id="alt-name"><i class="fa-solid fa-pen"></i></button>
              </div>
            </label>
            <label class="field">
              <span class="field__label">CPF</span>
              <div class="field-fuser">
                <input
                  class="field__input"
                  type="text"
                  name="cpf"
                  value="***.***.***-**"
                  data-desktop-value="***.***.***-**"
                  data-mobile-value="***.***.***-**"
                  id="cpf-input"
                />
                <button type="button" class="alt-button" id="alt-cpf"><i class="fa-solid fa-pen"></i></button>
              </div>
            </label>
            <label class="field">
              <span class="field__label">Email</span>
              <div class="field-fuser">
                <input
                  class="field__input"
                  type="text"
                  name="email"
                  value=""
                  id="email-input"
                />
                <button type="button" class="alt-button" id="alt-email"><i class="fa-solid fa-pen"></i></button>
              </div>
            </label>
            <label class="field">
              <span class="field__label">Nova senha</span>
              <div class="field-fuser">
                <input
                  class="field__input"
                  type="password"
                  name="nome"
                  value=""
                  id="password-input"
                />
                <button type="button" class="alt-button" id="alt-password"><i class="fa-solid fa-pen"></i></button>
              </div>
            </label>
            <label class="field-hide" id="conf-password">
              <span class="field__label">Confirmar senha</span>
              <div class="field-fuser">
                <input
                  class="field__input"
                  type="password"
                  name="nome"
                  value=""
                  id="conf-password-input"
                />
              </div>
            </label>
          <button type="button" class="btn-edit" id="btn-save-edit">Salvar alteraçôes</button>
        </div>
        <a href="./index.html" class="link-logout"><button type="button" class="btn-logout" >Sair da conta</button></a>
      </aside>

      <main class="main" id="conteudo-principal">
        <div class="main__grid">
          <section class="card card--progress" titulo="progresso-geral-titulo">
            <h2
              id="progresso-geral-titulo"
              class="card__title card__title--align-desktop-left"
            >
              Progresso Geral
            </h2>
            <div
              class="ring-progress"
              role="img"
              aria-label="Progresso geral em zero por cento"
            >
              <img class="progresso" src="" id="progress-img"/>
            </div>
            <p class="card__footnote">Nenhum nível concluído.</p>
          </section>

          <section class="card card--levels" aria-labelledby="niveis-titulo">
            <h2
              id="niveis-titulo"
              class="card__title card__title--align-desktop-left"
            >
              Níveis Concluídos
            </h2>
            <ul class="levels" id="checklist">
            </ul>
          </section>
        </div>

        <section
          class="card card--current"
          aria-labelledby="progresso-atual-titulo"
        >
          <h2
            id="progresso-atual-titulo"
            class="card__title card__title--center"
          >
            Progresso Atual
          </h2>
          <p class="card__subtitle">Para acessar seu progresso clique no botão abaixo !</p>
          <div class="mascot" aria-hidden="true">
            <img class="mascot" src="/assets/img/mascote-scrum-2.png" />
          </div>
          <a href="modulos.html"><button type="button" class="btn-primary">Módulos</button></a>
        </section>

        <section class="card card--diploma" aria-labelledby="diploma-titulo">
          <h2 id="diploma-titulo" class="card__title card__title--center">
            Diploma
          </h2>
          <p class="card__subtitle card__subtitle--narrow">
            Complete todos os níveis para desbloquear seu diploma.
          </p>
          <div class="diploma-art" aria-hidden="true">
            <img class="diploma" src="/assets/img/diploma-dashboard.png" />
          </div>
          <a href="tela-certificado.html"><button type="button" class="btn-primary">Ver certificado</button></a>
        </section>
      </main>
    </div>
    <script>
      (function () {
        var input = document.querySelector('.field__input[name="cpf"]');
        var mql = window.matchMedia("(max-width: 767px)");
        function syncCpf() {
          if (!input) return;
          input.value = mql.matches
            ? input.getAttribute("data-mobile-value")
            : input.getAttribute("data-desktop-value");
        }
        syncCpf();
        mql.addEventListener("change", syncCpf);
      })();
    </script>
    <script src="assets/js/dashboard.js"></script>
  </body>
</html>
