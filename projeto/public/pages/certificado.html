<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificado Scrum</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/certificado.css" />
    <link rel="icon" href="assets/img/scrum-master-logo-circle.ico" />
  </head>
  <body id="body-certificado">
    <main id="main-certificado">
    <!--Parte lateral maior do certificado-->
      <!--Parte de cima do certificado-->
      <div class="parte-lateral-maior-certificado">
            <div id="parte-topo-certificado">
                <h1 class="texto-certificado h1">CERTIFICADO</h1>
                <h2 class="texto-certificado">EM SCRUM</h2>
            </div>
            <!--Fim da parte de cima do certificado-->

            <!--Parte central do certificado-->
            <div class="div-texto-certificado">
                <p class="texto-certificado">Certificamos que</p>
                <h2 class="nomePessoaCertificada h2" id="nomePessoaCertificada">
                    
                </h2>
                <p class="texto-certificado">
                    Com o CPF nº <strong><span id="user-cpf"></span></strong>, email <strong><span id="user-email"></span></strong>, <br />
                    mostrou proficiência nos fundamentos da metodologia ágil <br />
                    Scrum por meio da realização e aprovação em avaliações. <br />
                    Concluindo com uma média final de <strong><span id="user-grade"></span></strong>.
                </p>
            </div>
            <!--Fim da parte central do certificado-->

            <!--Parte de baixo do certificado-->
                <div class="parte-inferior-certificado">
                    <div>
                        <span id="assinatura-scrum-master">Sprint Master</span>
                        <p class="texto-inferior">Plataforma</p>
                    </div>
                    <div>
                        <img class="logo-scrum-master" src="assets/img//scrum-master-logo-circle.png" alt="Logo Scrum Master"/>
                    </div>
                    <div>
                        <span id="data-emissao-certificado">05/05/2026</span>
                        <p class="texto-inferior">Data</p>
                    </div>
                </div>
        <!--Fim parte de baixo do certificado-->
        
        </div>
    <!--Fim da parte lateral maior do certificado-->
        
      <!--Parte lateral menor do certificado-->
      <div class="parte-lateral-menor-certificado">
        <img
          class="selo-scrum-master"
          alt="selo-scrum-master"
          src="assets/img/selo-scrum-master.png"
        />
      </div>
    </main>
    <script src="assets/js/certificado.js"></script>
  </body>
</html>
