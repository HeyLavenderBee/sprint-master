<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado Scrum</title>
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="icon" href="../assets/img/scrum-master-logo-circle.ico">
</head>
<body id="body-certificado">
    <main>
        <!--Parte central do certificado-->
        <div class="div-certificado">
            <div>
                <h1 class="texto-certificado">CERTIFICADO</h1>
                <h2 class="texto-certificado">EM SCRUM</h2>
            </div>
            <div>
                <p class="texto-certificado">Certificamos que</p>
                <h2 class="nomePessoaCertificada" id="nomePessoaCertificada"></h2>
                <p class="texto-certificado">Demonstrou proficiência nos fundamentos <br>
                   da metodologia ágil Scrum por meio de realização e <br>
                   aprovação em avaliações.</p>
            </div>
            <!--Fim da parte central do certificado-->

            <!--Parte de baixo do certificado-->
            <div>
                <span id="assinatura-scrum-master">Sprint Master</span>
                <p>Plataforma</p>
            </div>
            <div>
                <img class="logo-scrum-master" src="../assets/img//scrum-master-logo-circle.png" alt="">
            </div>
            <div>
                <span id="data-emissao-certificado">05/05/2026</span>
                <p>Data</p>
            </div>
            <!--Fim parte de baixo do certificado-->

            <!--Parte lateral do certificado-->
            <div class="parte-lateral-certificado">
               <img class="selo-scrum-master" alt="selo-scrum-master" src="../assets/img/selo-scrum-master.png"> 
            </div>
        </div>
    </main>
</body>
</html>
