<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resultado</title>
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="/assets/css/resultado-questionario.css">
    <link rel="icon" href="assets/img/scrum-master-logo-circle.ico" />
  </head>
  <body>
    <header id="header"></header>
    <script>
      fetch("components/header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;

          //importa o script do header e coloca nessa página
          const script = document.createElement("script");
          script.src = "assets/js/header.js";
          document.body.appendChild(script);
        });
    </script>
    <!--Parte principal da página-->
    <main class="main-quiz-result">
      <div class="quiz-result-content">
        <img
          src="assets/img/resultado-questionario/porcento-0-correto.png"
          alt="Porcentagem de acerto"
          id="img-percent"
        />
        <div class="quiz-result-div-text">
          <p class="quiz-result-text">Você acertou <span id="porcentagem-acerto">0%</span> do nível.</p>
          <p class="quiz-result-text medium" id="frase-consolo"></p>
          <p class="quiz-result-text super-small" id="tentativa-restante">Ainda resta uma tentativa.</p>

          <div id="choice-container">
          </div>
        </div>
        <a href="modulos.html" class="quiz-result-text a">Voltar aos módulos</a>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@hiseb/confetti@2.1.0/dist/confetti.min.js"></script>
    <script src="assets/js/resultado-questionario.js"></script>
  </body>
</html>
