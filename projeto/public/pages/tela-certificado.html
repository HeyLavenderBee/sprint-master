<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/tela-certificado.css" />
    <link rel="icon" href="assets/img/global/scrum-master-logo-circle.ico" />
      <link rel="stylesheet" href="/assets/css/alertas.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Scrum Master</title>
  </head>
  <body class="body-certificado">
    <header id="header"></header>
    <script>
      fetch("components/header.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("header").innerHTML = data;

          //importa o script do header e coloca nessa página
          const script = document.createElement("script");
          script.src = "assets/js/header.js";
          document.body.appendChild(script);
        });
    </script>

    <main class="certificate-page">
      <div class="container-certified">
        <!--Parte escrita do certificado-->
        <div class="div-escrita-certificado">
          <h1>Certificado digital</h1>
          <section class="bar-section">
            <div class="div-bar"></div>
            <p class="frase-certificado">
              <i
                >"O conhecimento lhe dará a oportunidade de fazer a
                diferença."</i
              >
            </p>
          </section>
          <div class="badge-div">
            <h2>Parabéns <span id="user-name"></span>!</h2>
            <img
              class="badge-certificado"
              src="assets/img/tela-certificado/Badge.png"
              alt="medalha de realização"
            />
          </div>
          <p class="paragraph-text">
            Sua certificação de conclusão de curso foi aprovada.
          </p>
          <p>Clique no botão abaixo para baixar seu certificado.</p>
        </div>

        <!--Botão baixar-->
        <div class="button-baixar">
          <button class="button-baixar-d" id="button-baixar" onclick="generatePDF()">Baixar</button>
        </div>
      </div>

      <div class="container-blue">
        <!--area do certificado-->
        <div class="blue-container">
          <img src="assets/img/tela-certificado/certificado-placeholder.jpg" />
        </div>

        <div class="button-aligment">
          <!--Botão abrir-->
          <div class="button-abrir">
            <a href="certificado.html" id="button-abrir-link">
              <button class="button-abrir-d" id="button-abrir">Abrir</button>
            </a>
          </div>

          <!--Botão imprimir-->
          <div class="button-imprimir">
            <button class="button-imprimir-d" id="button-imprimir" onclick="generatePDF()">Imprimir</button>
          </div>
        </div>
      </div>
    </main>
    <footer class="watermark">
      <p>© Sprint Master 2026</p>
    </footer>
    <script src="/assets/js/alertas.js" defer></script>
    <script src="assets/js/tela-certificado.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNaRQnYJYiPSqHHDb58B0yaPfCu+Wgds8Gp/gU33kqBtgNS4tSPHuGibyoeqMV/TJlSKda6FXzoEyYGjTe+vXA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js" integrity="sha512-+EeCylkt9WHJk5tGJxYdecHOcXFRME7qnbsfeMsdQL6NUPYm2+uGFmyleEqsmVoap/f3dN/sc3BX9t9kHXkHHg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  </body>
</html>
